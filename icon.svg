<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="82%">
      <stop offset="0%" stop-color="#123a20"/>
      <stop offset="100%" stop-color="#0a1c11"/>
    </radialGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#e9fa8f"/>
      <stop offset="52%" stop-color="#b9e93f"/>
      <stop offset="100%" stop-color="#7cb128"/>
    </radialGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffab5e"/><stop offset="100%" stop-color="#f07d1f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fd0ff"/><stop offset="100%" stop-color="#1f9fe0"/>
    </linearGradient>
    <clipPath id="bed"><ellipse cx="256" cy="150" rx="66" ry="84"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- SOL RAKET (turuncu) — kafa sol-üst, sap sağ-alt -->
  <g transform="rotate(-30 256 330)">
    <rect x="242" y="300" width="28" height="166" rx="13" fill="url(#orange)"/>
    <rect x="242" y="408" width="28" height="58" rx="13" fill="#c96a17"/>
    <path d="M256 244 L234 306 Q256 294 278 306 Z" fill="url(#orange)"/>
    <ellipse cx="256" cy="150" rx="80" ry="98" fill="#0a1c11" stroke="url(#orange)" stroke-width="18"/>
    <g clip-path="url(#bed)" stroke="#ffffff" stroke-width="2.4" opacity="0.2">
      <line x1="206" y1="55" x2="206" y2="245"/><line x1="231" y1="55" x2="231" y2="245"/>
      <line x1="256" y1="55" x2="256" y2="245"/><line x1="281" y1="55" x2="281" y2="245"/>
      <line x1="306" y1="55" x2="306" y2="245"/>
      <line x1="165" y1="100" x2="347" y2="100"/><line x1="165" y1="125" x2="347" y2="125"/>
      <line x1="165" y1="150" x2="347" y2="150"/><line x1="165" y1="175" x2="347" y2="175"/>
      <line x1="165" y1="200" x2="347" y2="200"/>
    </g>
  </g>

  <!-- SAĞ RAKET (mavi) — kafa sağ-üst, sap sol-alt -->
  <g transform="rotate(30 256 330)">
    <rect x="242" y="300" width="28" height="166" rx="13" fill="url(#blue)"/>
    <rect x="242" y="408" width="28" height="58" rx="13" fill="#1877a8"/>
    <path d="M256 244 L234 306 Q256 294 278 306 Z" fill="url(#blue)"/>
    <ellipse cx="256" cy="150" rx="80" ry="98" fill="#0a1c11" stroke="url(#blue)" stroke-width="18"/>
    <g clip-path="url(#bed)" stroke="#ffffff" stroke-width="2.4" opacity="0.2">
      <line x1="206" y1="55" x2="206" y2="245"/><line x1="231" y1="55" x2="231" y2="245"/>
      <line x1="256" y1="55" x2="256" y2="245"/><line x1="281" y1="55" x2="281" y2="245"/>
      <line x1="306" y1="55" x2="306" y2="245"/>
      <line x1="165" y1="100" x2="347" y2="100"/><line x1="165" y1="125" x2="347" y2="125"/>
      <line x1="165" y1="150" x2="347" y2="150"/><line x1="165" y1="175" x2="347" y2="175"/>
      <line x1="165" y1="200" x2="347" y2="200"/>
    </g>
  </g>

  <!-- RAKET İÇİ SKORLAR (dik, okunur) -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="800" text-anchor="middle">
    <ellipse cx="171" cy="176" rx="50" ry="44" fill="#0a1c11" opacity="0.72"/>
    <text x="171" y="176" font-size="60" fill="#ffffff" dominant-baseline="central">15</text>
    <ellipse cx="341" cy="176" rx="50" ry="44" fill="#0a1c11" opacity="0.72"/>
    <text x="341" y="176" font-size="60" fill="#ffffff" dominant-baseline="central">30</text>
  </g>

  <!-- TOP (üst orta) -->
  <g transform="translate(256 96)">
    <circle r="50" fill="url(#ball)" stroke="#14401c" stroke-width="4"/>
    <path d="M-17 -46 C -38 -17, -38 17, -17 46" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
    <path d="M17 -46 C 38 -17, 38 17, 17 46" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
    <ellipse cx="-15" cy="-18" rx="16" ry="9" fill="#ffffff" opacity="0.28" transform="rotate(-28 -15 -18)"/>
  </g>
</svg>
